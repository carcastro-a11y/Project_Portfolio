/* ── Utility: Intersection Observer hook ── */
function useFadeUp(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

/* ── HERO ── */
function Hero() {
  const [typed, setTyped] = useState('');
  const words = ["Data Analyst", "ML Engineer", "Startup Builder"];
  const wordRef = useRef(0);
  const charRef = useRef(0);
  const deletingRef = useRef(false);

  useEffect(() => {
    let timeout;
    const tick = () => {
      const word = words[wordRef.current];
      if (!deletingRef.current) {
        if (charRef.current < word.length) {
          charRef.current++;
          setTyped(word.slice(0, charRef.current));
          timeout = setTimeout(tick, 75);
        } else {
          timeout = setTimeout(() => { deletingRef.current = true; tick(); }, 2200);
        }
      } else {
        if (charRef.current > 0) {
          charRef.current--;
          setTyped(word.slice(0, charRef.current));
          timeout = setTimeout(tick, 42);
        } else {
          deletingRef.current = false;
          wordRef.current = (wordRef.current + 1) % words.length;
          timeout = setTimeout(tick, 300);
        }
      }
    };
    timeout = setTimeout(tick, 900);
    return () => clearTimeout(timeout);
  }, []);

  return (
    <section id="home" style={{minHeight: '100vh', display: 'flex', alignItems: 'center', padding: '100px 32px 60px', maxWidth: 1160, margin: '0 auto'}}>
      <div style={{display: 'flex', alignItems: 'center', gap: 60, width: '100%', flexWrap: 'wrap'}}>
        {/* Left text */}

          <h1 style={{fontSize: 'clamp(40px, 5vw, 62px)', fontWeight: 900, letterSpacing: '-0.04em', lineHeight: 1.05, marginBottom: 16}}>
            Hey, I'm{' '}
            <span style={{background: 'linear-gradient(135deg, #7C3AED, #9D6EFF, #C4B5FD)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text'}}>
              Carlo.
            </span>
          </h1>

          <div style={{fontSize: 'clamp(20px, 2.5vw, 28px)', fontWeight: 700, letterSpacing: '-0.03em', color: 'var(--text)', marginBottom: 20, height: 40, display: 'flex', alignItems: 'center', gap: 2}}>
            <span>{typed}</span>
            <span style={{display: 'inline-block', width: 2, height: '1.1em', background: '#7C3AED', borderRadius: 1, animation: 'blink 1s step-end infinite', verticalAlign: 'middle', marginLeft: 2}}></span>
          </div>

          <p style={{fontSize: 17, color: 'var(--muted)', lineHeight: 1.75, maxWidth: 480, marginBottom: 36, fontWeight: 400}}>
            Turning messy data into decisions, and building AI tools that quietly do the work no one wants to.
          </p>

          {/* Social row */}
          <div style={{display: 'flex', alignItems: 'center', gap: 12, marginBottom: 36, flexWrap: 'wrap'}}>
            <a href="https://github.com/carcastro-a11y" target="_blank" rel="noopener noreferrer" style={socialBtnStyle}>
              <GitHubIcon size={18} />
              <span>GitHub</span>
            </a>
            <a href="https://linkedin.com/in/carlocastro1" target="_blank" rel="noopener noreferrer" style={socialBtnStyle}>
              <LinkedInIcon size={18} />
              <span>LinkedIn</span>
            </a>

function Contact() {
  const ref = useFadeUp();
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [errors, setErrors] = useState({});
  const [sent, setSent] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Name is required';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if (!form.message.trim()) e.message = 'Message is required';
    return e;
  };

  const handleSubmit = (e) => {

                <div>
                  <label style={{fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--muted2)', display: 'block', marginBottom: 7}}>Name</label>
                  <input style={inputStyle('name')} value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Your name" />
                  {errors.name && <div style={{fontSize: 12, color: '#EF4444', marginTop: 5}}>{errors.name}</div>}
                </div>
                <div>
                  <label style={{fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--muted2)', display: 'block', marginBottom: 7}}>Email</label>
                  <input style={inputStyle('email')} type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="your@email.com" />
                  {errors.email && <div style={{fontSize: 12, color: '#EF4444', marginTop: 5}}>{errors.email}</div>}
                </div>
                <div>
                  <label style={{fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--muted2)', display: 'block', marginBottom: 7}}>Message</label>
                  <textarea style={{...inputStyle('message'), minHeight: 120}} value={form.message} onChange={e => setForm({...form, message: e.target.value})} placeholder="What's on your mind?" />
                  {errors.message && <div style={{fontSize: 12, color: '#EF4444', marginTop: 5}}>{errors.message}</div>}
                </div>
                <button type="submit" style={{
                  padding: '13px 0', borderRadius: 10, fontSize: 15, fontWeight: 700,
                  letterSpacing: '-0.02em', border: 'none', cursor: 'pointer', color: '#fff',
                  background: 'linear-gradient(135deg, #7C3AED, #6D28D9)',
                  boxShadow: '0 0 24px rgba(124,58,237,0.4)',
                  transition: 'all 0.2s',
                }}>
                  Send Message
                </button>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── Section label ── */
const SectionLabel = ({ children }) => (
  <div style={{display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 12}}>
    <div style={{width: 20, height: 2, background: 'var(--accent)', borderRadius: 1}}></div>
    <span style={{fontSize: 12, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--accent-light)'}}>{children}</span>
  </div>
);

/* ── APP ── */
function App() {
  const [activeSection, setActiveSection] = useState('home');

  useEffect(() => {
    const sections = ['home', 'about', 'projects', 'contact'];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
    }, { threshold: 0.3 });
    sections.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  return (
    <>
      <Nav activeSection={activeSection} />
      <Hero />
      <div style={{height: 1, background: 'linear-gradient(90deg, transparent, rgba(124,58,237,0.2), transparent)', maxWidth: 1160, margin: '0 auto 0'}} />
      <About />
      <div style={{height: 1, background: 'linear-gradient(90deg, transparent, rgba(124,58,237,0.15), transparent)', maxWidth: 1160, margin: '0 auto'}} />
      <Projects />
      <div style={{height: 1, background: 'linear-gradient(90deg, transparent, rgba(124,58,237,0.15), transparent)', maxWidth: 1160, margin: '0 auto'}} />
      <Contact />
      <Footer />

      {/* Second ambient glow, bottom right */}
      <div style={{position: 'fixed', bottom: -100, right: -100, width: 500, height: 500, background: 'radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%)', pointerEvents: 'none', zIndex: 0}} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
